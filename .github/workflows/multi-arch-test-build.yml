name: Test and Build

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read

permissions:
  contents: read
  pull-requests: write

jobs:
  formalities:
    name: Check Formalities Result
    if: github.event.issue.pull_request
    runs-on: ubuntu-slim
    outputs:
      result: ${{ steps.parse.outputs.result }}
    steps:
      - name: Parse comment for build status
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            if (context.payload.sender.type !== 'Bot') {
              console.log('Comment is not from a bot. Skipping.');
              return;
            }

            const body = context.payload.comment.body;
            const marker = "<!-- BUILD_LOOKUP -->";

            if (!body.includes(marker)) {
              console.log('Comment does not contain the build marker. Skipping.');
              return;
            }

            const regex = /Build info<!-- (.*) -->/;
            const match = body.match(regex);

            if (match && match[1]) {
              const { build } = JSON.parse(match[1]);
              core.setOutput('result', build ? 'success' : 'failure');
